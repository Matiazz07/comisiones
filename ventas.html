<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ventas.css">
</head>
<body>

    <div class="contenedor">
        <div class="header-calculadora">
            <h1>Cálculo de Comisiones</h1>
            <p>Ingresa los datos para proyectar tus ganancias</p>
        </div>

        <div class="form-group">
            <label for="txtSueldoBase">Salario Base ($):</label>
            <input type="number" id="txtSueldoBase" placeholder="Ej. 500">
        </div>

        <div class="form-group">
            <label for="txtVentas">Número de ventas:</label>
            <input type="number" id="txtVentas" placeholder="Ej. 15">
        </div>

        <div class="form-group">
            <label for="txtPrecio">Precio del producto ($):</label>
            <input type="number" id="txtPrecio" placeholder="Ej. 50">
        </div>

        <button class="btn-calcular" onclick="calcular();">Calcular Comisión</button>

        <div class="resultados-panel">
            <h2>Resumen de Resultados</h2>
            <div class="resultado-item">
                <span>Salario Base:</span>
                <span class="valor">$<span id="spSueldoBase">0.00</span></span>
            </div>
            <div class="resultado-item">
                <span>Comisiones Extra:</span>
                <span class="valor destello">$<span id="spComision">0.00</span></span>
            </div>
            <hr>
            <div class="resultado-item total">
                <span>Total a Recibir:</span>
                <span class="valor-total">$<span id="spTotal">0.00</span></span>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="ventas.js"></script>
</body>
</html>
